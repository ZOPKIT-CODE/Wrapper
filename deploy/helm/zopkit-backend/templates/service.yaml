{{/*
ClusterIP Service fronting the web Deployment for this app (wrapper/crm/fa).
The ALB Ingress (ingress.yaml) targets this Service on port 80, which forwards
to the container's app port (.Values.port). Workers (worker-deployment.yaml)
have no HTTP port and are intentionally NOT selected here.
*/}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "zb.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "zb.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "zb.webSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: {{ .Values.port }}
      protocol: TCP
