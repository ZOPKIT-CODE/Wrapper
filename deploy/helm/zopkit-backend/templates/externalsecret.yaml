{{- /*
ExternalSecret (External Secrets Operator) — pulls this app's secret bundle from
AWS Secrets Manager and materializes it as a native Kubernetes Secret named
"{{ include "zb.fullname" . }}-secret". The web Deployment and worker Deployments
consume that Secret via `envFrom.secretRef` (see deployment.yaml / worker-deployment.yaml).

The remote secret is the per-app bundle created in Terraform (aws_secretsmanager_secret.app[<app>],
name "zopkit/<env>/<app>"). `dataFrom.extract` flattens every JSON key in that secret into
a corresponding key in the target Secret, so the env var names map 1:1 to the secret keys.

Requires the ESO CRDs and the ClusterSecretStore "aws-secretsmanager" (provisioned in
addons.tf) to exist in the cluster before this resource is applied.
*/}}
{{- if .Values.externalSecret.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "zb.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "zb.labels" . | nindent 4 }}
spec:
  # How often ESO re-reads the remote secret and refreshes the target.
  refreshInterval: {{ .Values.externalSecret.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreRef }}
    kind: ClusterSecretStore
  target:
    # Native K8s Secret consumed by the Deployment/worker secretRef.
    name: {{ include "zb.fullname" . }}-secret
    creationPolicy: Owner
  # Pull ALL JSON keys from the per-app Secrets Manager bundle into the target Secret,
  # plus any shared bundles (e.g. the Valkey secret holding REDIS_URL/REDIS_PASSWORD/
  # REDIS_ENABLED) so the provisioned cache is actually reachable from the pods.
  dataFrom:
    - extract:
        key: {{ .Values.externalSecret.remoteRef.key | quote }}
    {{- range .Values.externalSecret.sharedKeys }}
    - extract:
        key: {{ . | quote }}
    {{- end }}
{{- end }}
