{{- /*
ServiceAccount for the app pod (web + workers share it).
The SA name (default: .Values.app -> wrapper/crm/fa) MUST match the IRSA trust
policy in terraform/iam_irsa.tf, which binds system:serviceaccount:<namespace>:<app>
to aws_iam_role.app[<app>]. The eks.amazonaws.com/role-arn annotation is what wires
this SA to that IAM role so pods receive AWS creds via the OIDC web-identity flow.
*/ -}}
{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "zb.serviceAccountName" . }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "zb.labels" . | nindent 4 }}
  annotations:
    {{- if .Values.serviceAccount.roleArn }}
    eks.amazonaws.com/role-arn: {{ .Values.serviceAccount.roleArn | quote }}
    {{- end }}
    {{- with .Values.serviceAccount.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end -}}
