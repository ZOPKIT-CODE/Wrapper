name: CI (PR gate)

# Blocking checks on every PR — so a bad migration or an app<->schema mismatch
# cannot be merged. (deploy-ec2.yml only runs on push-to-main; the integration
# suite there is advisory. This is the gate that actually blocks merges.)

on:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  db-integrity:
    name: Migration journal + schema drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Migration journal sanity (idx/when monotonic, no orphan SQL)
        run: pnpm --filter wrapper-backend run db:check:journal
      - name: Schema drift gate (migrations must reproduce schema.sql)
        run: pnpm --filter wrapper-backend run db:drift

  backend-tests:
    name: Backend unit + integration (blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Backend is type-clean (0 errors), so gate it to prevent type regressions
      # (vitest does not type-check). The frontend is NOT gated this way yet (debt).
      - name: Type-check (backend)
        working-directory: backend
        run: pnpm typecheck
      - name: Unit tests (backend)
        working-directory: backend
        run: pnpm test
      # Integration tests build a fresh DB from the migrations (Testcontainers) and
      # run against the REAL schema — this is what catches app<->schema drift.
      - name: Integration tests (backend)
        working-directory: backend
        run: pnpm test:integration
        timeout-minutes: 12

  frontend-checks:
    name: Frontend typecheck + lint + build + tests (blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      # Type safety: tsc is at 0 errors (strict). vite/esbuild does NOT type-check, so
      # this is the real type gate.
      - name: Type-check (frontend)
        working-directory: frontend
        run: pnpm run type-check
      # Lint: errors block; no-explicit-any is a (non-blocking) warning — ~543 of those
      # remain as tracked debt to burn down.
      - name: Lint (frontend, errors only)
        working-directory: frontend
        run: pnpm run lint:ci
      - name: Build (blocking)
        working-directory: frontend
        run: pnpm build
      - name: Unit tests (frontend)
        working-directory: frontend
        run: pnpm test
