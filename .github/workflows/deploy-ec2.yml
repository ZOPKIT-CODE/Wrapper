# Deploy Wrapper to EC2
# Trigger: push to main, or manual dispatch
#
# Job flow:
#   test ──► build ──► deploy
#              │
#          (integration tests run in parallel, advisory only)

name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'   # 1 AM UTC every night

# Cancel in-progress deploy if a newer commit is pushed
concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  APP_DIR: /home/${{ secrets.EC2_USER || 'ec2-user' }}/Wrapper

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Unit tests + TypeScript check (GATE — blocks deploy on failure) ─────
  test:
    name: Unit tests & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Guard committed DB migrations
        run: |
          pnpm --filter wrapper-backend run db:generate
          pnpm --filter wrapper-backend run db:check:registry
          if [ -n "$(git status --porcelain -- backend/src/db/migrations)" ]; then
            echo "::error::Schema changes detected without committed migration files."
            echo "Run: pnpm --filter wrapper-backend run db:generate"
            echo "Then commit changes under backend/src/db/migrations."
            git status --short -- backend/src/db/migrations
            exit 1
          fi

      - name: Type-check backend
        working-directory: backend
        run: pnpm exec tsc --noEmit

      - name: Unit tests (backend)
        working-directory: backend
        run: pnpm test

      - name: Type-check frontend
        working-directory: frontend
        continue-on-error: true
        run: pnpm exec tsc --noEmit

      - name: Unit tests (frontend)
        working-directory: frontend
        continue-on-error: true
        run: pnpm test -- --run

      - name: Lint backend
        working-directory: backend
        continue-on-error: true
        run: pnpm lint || true

      - name: Lint frontend
        working-directory: frontend
        continue-on-error: true
        run: pnpm lint || true

      - name: Security audit (dependencies)
        continue-on-error: true
        run: pnpm audit --audit-level=high || true

  # ── 2. Build (frontend + backend compile) ─────────────────────────────────
  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        run: |
          cp .env.production .env
          pnpm run build
        env:
          CI: true

      - name: Build backend (verify TS compiles cleanly)
        working-directory: backend
        run: pnpm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist/
          retention-days: 7

      - name: Upload backend dist
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist-${{ github.sha }}
          path: backend/dist/
          retention-days: 7

  # ── 3. Integration tests (advisory — runs in parallel, does NOT block deploy) ─
  # To promote to a hard gate: add "needs: integration-test" to the deploy job
  integration-test:
    name: Integration tests
    needs: test
    runs-on: ubuntu-latest
    continue-on-error: true          # advisory: won't block deploy
    env:
      DATABASE_URL: ${{ secrets.INTEGRATION_DATABASE_URL }}
      TEST_DATABASE_URL: ${{ secrets.INTEGRATION_DATABASE_URL }}
      SKIP_TESTCONTAINERS: ${{ secrets.INTEGRATION_DATABASE_URL != '' && 'true' || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set up Docker (Testcontainers fallback)
        if: env.SKIP_TESTCONTAINERS != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Integration tests (backend)
        working-directory: backend
        run: pnpm test:integration
        timeout-minutes: 10

  # ── 4. Deploy (zero-downtime, auto-rollback on failure) ───────────────────
  deploy:
    name: Deploy to EC2
    needs: [build, integration-test]
    runs-on: ubuntu-latest
    permissions:
      contents: write                  # needed for git tag + gh release
    environment: production            # requires environment approval if configured
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-${{ github.sha }}
          path: frontend/dist/

      - name: Download backend dist
        uses: actions/download-artifact@v4
        with:
          name: backend-dist-${{ github.sha }}
          path: backend/dist/

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      # ── Step 1: Snapshot current dist for rollback ────────────────────────
      - name: Snapshot current dist for rollback
        env:
          EC2_USER: ${{ secrets.EC2_USER || 'ec2-user' }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          SNAPSHOT_TAG=$(date +%Y%m%d_%H%M%S)
          echo "SNAPSHOT_TAG=${SNAPSHOT_TAG}" >> $GITHUB_ENV

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${EC2_USER}@${EC2_HOST} bash <<EOF
          set -e
          if [ -f "${APP_DIR}/backend/dist/bootstrap.js" ]; then
            cp -r "${APP_DIR}/backend/dist" "${APP_DIR}/backend/dist.snapshot.${SNAPSHOT_TAG}"
            echo "✅ Snapshot saved: dist.snapshot.${SNAPSHOT_TAG}"
            # Keep only last 3 snapshots
            ls -dt "${APP_DIR}/backend/dist.snapshot."* 2>/dev/null | tail -n +4 | xargs rm -rf 2>/dev/null || true
          else
            echo "ℹ️ No existing dist found (first deploy)"
          fi
          EOF

      # ── Step 2: Rsync source code ─────────────────────────────────────────
      - name: Rsync code to EC2
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            --exclude 'node_modules' \
            --exclude '.env' \
            --exclude '.git' \
            --exclude 'frontend/node_modules' \
            --exclude 'backend/node_modules' \
            --exclude 'backend/dist.snapshot.*' \
            ./ ${{ secrets.EC2_USER || 'ec2-user' }}@${{ secrets.EC2_HOST }}:${APP_DIR}/

      # ── Step 3: Deploy Nginx config with correct cache headers ───────────
      - name: Deploy Nginx config
        env:
          EC2_USER: ${{ secrets.EC2_USER || 'ec2-user' }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${EC2_USER}@${EC2_HOST} bash <<EOF
          set -e
          FRONTEND_DIST="${APP_DIR}/frontend/dist"

          # wrapper.conf — primary config (certbot SSL + cache headers for zopkit.com)
          # This is the config that actually handles HTTPS traffic.
          sed "s|FRONTEND_DIST_PATH|\${FRONTEND_DIST}|g" \
            "${APP_DIR}/infra/nginx/wrapper.conf" \
            > /tmp/wrapper.conf
          sudo cp /tmp/wrapper.conf /etc/nginx/conf.d/wrapper.conf

          # zopkit.conf — kept as a port-80 default catch-all (harmless)
          sed "s|FRONTEND_DIST_PATH|\${FRONTEND_DIST}|g" \
            "${APP_DIR}/infra/nginx/zopkit.conf" \
            > /tmp/zopkit.conf
          sudo cp /tmp/zopkit.conf /etc/nginx/conf.d/zopkit.conf

          # Validate config before reloading
          sudo nginx -t
          sudo systemctl reload nginx
          echo "✅ Nginx configs deployed and reloaded"
          EOF

      # ── Step 4: Install deps + run DB migrations ──────────────────────────
      - name: Install deps & run DB migrations
        env:
          EC2_USER: ${{ secrets.EC2_USER || 'ec2-user' }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${EC2_USER}@${EC2_HOST} bash <<EOF
          set -e
          cd "${APP_DIR}"
          command -v pnpm >/dev/null 2>&1 || sudo npm install -g pnpm
          pnpm install --frozen-lockfile
          cd backend
          echo "🗄️ Running DB migrations..."
          if [ -n "${MIGRATION_DATABASE_URL}" ]; then
            DATABASE_URL="${MIGRATION_DATABASE_URL}" pnpm run db:migrate
          else
            pnpm run db:migrate
          fi
          echo "✅ Migrations complete"
          EOF

      # ── Step 4b: Reconcile tenant applications (fill org_apps gaps) ────────────
      - name: Reconcile tenant applications
        env:
          EC2_USER: ${{ secrets.EC2_USER || 'ec2-user' }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          MIGRATION_DATABASE_URL: ${{ secrets.MIGRATION_DATABASE_URL }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${EC2_USER}@${EC2_HOST} bash <<EOF
          set -e
          cd "${APP_DIR}/backend"
          echo "🔄 Reconciling tenant applications..."
          if [ -n "${MIGRATION_DATABASE_URL}" ]; then
            DATABASE_URL="${MIGRATION_DATABASE_URL}" pnpm run reconcile-tenant-apps
          else
            pnpm run reconcile-tenant-apps
          fi
          echo "✅ Reconcile complete"
          EOF

      # ── Step 4c: Boot smoke test (starts new binary, checks /health + key endpoints) ─
      - name: Boot smoke test
        env:
          EC2_USER: ${{ secrets.EC2_USER || 'ec2-user' }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${EC2_USER}@${EC2_HOST} bash <<'SMOKE'
          set -e
          cd "${HOME}/Wrapper/backend"

          echo "🚀 Starting new binary for smoke test on port 3099..."
          # Use port 3099 so the smoke binary doesn't collide with the PM2-managed
          # process already occupying port 3000 (old binary serves live traffic until PM2 reload).
          PORT=3099 node --enable-source-maps dist/bootstrap.js &
          SMOKE_PID=$!
          trap "kill ${SMOKE_PID} 2>/dev/null; echo 'smoke process killed'" EXIT

          # Wait up to 30s for /health on the smoke port
          for i in $(seq 1 30); do
            if curl -fsS --connect-timeout 2 http://127.0.0.1:3099/health >/dev/null 2>&1; then
              echo "✅ /health responded (attempt ${i})"
              break
            fi
            if [ "${i}" -eq 30 ]; then
              echo "❌ /health never responded after 30s"
              exit 1
            fi
            sleep 1
          done

          # Check /api/version returns non-empty JSON with a sha field
          VERSION_RESP=$(curl -fsS http://127.0.0.1:3099/api/version)
          echo "${VERSION_RESP}" | grep -q '"sha"' || { echo "❌ /api/version missing sha field"; exit 1; }
          echo "✅ /api/version OK: ${VERSION_RESP}"

          # Check /api/plans returns all plans
          PLANS_RESP=$(curl -fsS http://127.0.0.1:3099/api/plans)
          echo "${PLANS_RESP}" | grep -q '"starter"' || { echo "❌ /api/plans missing starter plan"; exit 1; }
          echo "✅ /api/plans OK"

          echo "✅ Boot smoke test passed"
          SMOKE

      # ── Step 4: Reload PM2 (zero-downtime — old process serves until new is ready) ──
      - name: Reload PM2 with new build
        env:
          EC2_USER: ${{ secrets.EC2_USER || 'ec2-user' }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${EC2_USER}@${EC2_HOST} bash <<EOF
          set -e
          cd "${APP_DIR}/backend"

          # Stamp the deployed commit SHA into the PM2 process env so the
          # /api/version endpoint can return it at runtime without needing git.
          export GITHUB_SHA="${{ github.sha }}"

          # Use reload (graceful) if already running, start fresh if not
          if pm2 show wrapper-api > /dev/null 2>&1; then
            pm2 reload wrapper-api --update-env
            echo "✅ PM2 reloaded (zero-downtime)"
          else
            pm2 start dist/bootstrap.js --name wrapper-api
            echo "✅ PM2 started (first deploy)"
          fi

          pm2 save
          pm2 status
          EOF

      # ── Step 4b: Capture PM2 logs immediately after reload (always visible) ─
      - name: Capture PM2 startup logs
        if: always()
        env:
          EC2_USER: ${{ secrets.EC2_USER || 'ec2-user' }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "Waiting 8s for process to start/crash..."
          sleep 8
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${EC2_USER}@${EC2_HOST} bash <<'EOF'
          echo "=== pm2 status ==="
          pm2 status
          echo ""
          echo "=== pm2 logs wrapper-api (last 80 lines) ==="
          pm2 logs wrapper-api --lines 80 --nostream 2>&1 || true
          echo ""
          echo "=== node version ==="
          node --version
          echo "=== disk usage ==="
          df -h / | tail -1
          echo "=== memory ==="
          free -m | head -2
          EOF

      # ── Step 5: Health check — actually fails the pipeline ────────────────
      - name: Health check
        id: healthcheck
        env:
          EC2_USER: ${{ secrets.EC2_USER || 'ec2-user' }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "Checking health endpoint from inside EC2 via localhost:3000"

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${EC2_USER}@${EC2_HOST} bash <<'EOF'
          set -e
          HEALTH_URL="http://localhost:3000/health"
          for i in 1 2 3 4 5; do
            if curl -sf --connect-timeout 5 "${HEALTH_URL}" > /dev/null; then
              echo "✅ Health check passed (attempt ${i})"
              curl -s "${HEALTH_URL}"
              exit 0
            fi
            echo "Attempt ${i} failed — retrying in 6s..."
            sleep 6
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1
          EOF

      # ── Step 5b: Dump PM2 logs on health check failure (before rollback) ──
      - name: Dump PM2 logs on failure
        if: failure() && steps.healthcheck.outcome == 'failure'
        env:
          EC2_USER: ${{ secrets.EC2_USER || 'ec2-user' }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "=== DIAGNOSTIC: PM2 logs at time of health check failure ==="
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${EC2_USER}@${EC2_HOST} bash <<'EOF'
          echo "--- pm2 status ---"
          pm2 status
          echo ""
          echo "--- pm2 logs wrapper-api (last 150 lines) ---"
          pm2 logs wrapper-api --lines 150 --nostream 2>&1 || true
          echo ""
          echo "--- /proc/meminfo ---"
          head -5 /proc/meminfo
          echo "--- disk ---"
          df -h /
          echo "--- listening ports ---"
          ss -tlnp 2>/dev/null | grep -E '3000|LISTEN' || netstat -tlnp 2>/dev/null | grep 3000 || true
          EOF

      # ── Step 6: Auto-rollback if health check failed ──────────────────────
      - name: Auto-rollback on health check failure
        if: failure() && steps.healthcheck.outcome == 'failure'
        env:
          EC2_USER: ${{ secrets.EC2_USER || 'ec2-user' }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          SNAPSHOT_TAG: ${{ env.SNAPSHOT_TAG }}
        run: |
          echo "🔄 Health check failed — rolling back to snapshot ${SNAPSHOT_TAG}..."

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${EC2_USER}@${EC2_HOST} bash <<EOF
          set -e
          SNAPSHOT="${APP_DIR}/backend/dist.snapshot.${SNAPSHOT_TAG}"

          if [ -d "\${SNAPSHOT}" ]; then
            rm -rf "${APP_DIR}/backend/dist"
            cp -r "\${SNAPSHOT}" "${APP_DIR}/backend/dist"
            pm2 reload wrapper-api --update-env
            pm2 status
            echo "✅ Rollback complete — restored \${SNAPSHOT}"
          else
            echo "⚠️ No snapshot found at \${SNAPSHOT} — manual intervention required"
            exit 1
          fi
          EOF

          echo "❌ Deploy failed and was rolled back. Commit: ${{ github.sha }}"
          exit 1

      - name: Create GitHub release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(node -p "require('./frontend/package.json').version")
          git tag -f "v${VERSION}" && git push origin "v${VERSION}" --force
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "Deployed $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --latest 2>/dev/null \
          || gh release edit "v${VERSION}" \
            --title "v${VERSION}" \
            --notes "Deployed $(date -u '+%Y-%m-%d %H:%M UTC')" \
            --latest

      - name: Deployment summary
        if: success()
        run: |
          echo "✅ Deployment successful"
          echo "   Commit : ${{ github.sha }}"
          echo "   Branch : ${{ github.ref_name }}"
          echo "   Actor  : ${{ github.actor }}"

# ─────────────────────────────────────────────────────────────────────────────
# Nightly integration test run (separate from deploy — keeps main pipeline fast)
# ─────────────────────────────────────────────────────────────────────────────
  nightly-integration:
    name: Nightly integration tests
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: docker/setup-buildx-action@v3
      - name: Run integration tests
        working-directory: backend
        run: pnpm test:integration
        timeout-minutes: 15

# Nightly schedule is enabled in the top-level `on:` block.
