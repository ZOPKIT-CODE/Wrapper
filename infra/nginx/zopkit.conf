# Nginx config for Zopkit frontend (SPA)
# Deployed to: /etc/nginx/sites-available/zopkit
# Symlinked: /etc/nginx/sites-enabled/zopkit -> /etc/nginx/sites-available/zopkit
#
# Cache strategy:
#   index.html / sw.js / manifest   → no-cache   (always fetch fresh from server)
#   /assets/* (content-hashed)      → 1 year     (hash changes when content changes)
#   everything else                 → no-cache   (SPA fallback)

server {
    listen 80;
    server_name _;

    # Frontend dist — PLACEHOLDER replaced by deploy script
    root FRONTEND_DIST_PATH;
    index index.html;

    # ── Gzip compression ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        application/manifest+json image/svg+xml;

    # ── index.html — NEVER cache ─────────────────────────────────────────
    # This is the SPA entry point. The browser must always fetch it fresh
    # so it gets the latest asset hashes after a deploy.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # ── Service worker + workbox runtime + PWA manifest — NEVER cache ───────
    # Browsers have special SW update rules, but explicit no-cache ensures
    # the browser always checks for a new version on page load. Workbox
    # runtime files are content-hashed but still served via stable names by
    # VitePWA, so they must also bypass caching.
    location ~* ^/(sw\.js|registerSW\.js|workbox-[^/]+\.js|site\.webmanifest|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # ── Vite assets (content-hashed) — cache 1 year ───────────────────────
    # Vite appends a content hash to every JS/CSS filename (e.g. index-Cjk4a25d.js).
    # If the file content changes, the hash changes → new filename → new cache entry.
    # Safe to cache forever (immutable).
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        gzip_static on;
        expires 1y;
    }

    # ── SPA fallback — all routes serve index.html ────────────────────────
    # React Router handles routing client-side. Unmatched server paths must
    # return index.html so deep-links and refreshes work.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
