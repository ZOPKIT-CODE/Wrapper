server {
    listen 80;
    server_name zopkit.com *.zopkit.com;

    root /home/ec2-user/Wrapper/frontend/dist;
    index index.html;

    # index.html — NEVER cache (always fetch latest on deploy)
    location = /index.html {
        add_header Cache-Control 'no-cache, no-store, must-revalidate';
        add_header Pragma 'no-cache';
        add_header Expires '0';
    }

    # Hashed static assets (JS, CSS, images) — cache aggressively
    location /assets/ {
        add_header Cache-Control 'public, max-age=31536000, immutable';
    }

    # Service worker — never cache
    location = /sw.js {
        add_header Cache-Control 'no-cache, no-store, must-revalidate';
    }
    location = /registerSW.js {
        add_header Cache-Control 'no-cache, no-store, must-revalidate';
    }

    # PWA manifest — short cache
    location = /manifest.webmanifest {
        add_header Cache-Control 'public, max-age=3600';
    }

    # SPA routing — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API proxy to backend
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
