# Primary Nginx config for zopkit.com
# Certbot manages the SSL lines (marked "# managed by Certbot") — do not reorder them.
# Deploy script substitutes FRONTEND_DIST_PATH before copying to /etc/nginx/conf.d/wrapper.conf
#
# Cache strategy:
#   index.html + SPA fallback + SW/manifest  → no-store (always fresh)
#   /assets/* (content-hashed by Vite)       → 1 year immutable
#   /api/*                                   → proxied, no Nginx caching

# ── Default HTTP catch-all (non-zopkit.com traffic) ──────────────────────────
server {
    listen 80 default_server;
    server_name _;

    root FRONTEND_DIST_PATH;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         "upgrade";
    }

    location = /health {
        proxy_pass http://127.0.0.1:3000/health;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# ── HTTPS — zopkit.com (certbot-managed SSL) ──────────────────────────────────
server {
    server_name www.zopkit.com zopkit.com; # managed by Certbot

    root FRONTEND_DIST_PATH;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json
        application/manifest+json image/svg+xml;

    # index.html — never cache (SPA entry; must be fresh after every deploy)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Service worker + PWA manifest — never cache
    location ~* ^/(sw\.js|registerSW\.js|workbox-[^/]+\.js|site\.webmanifest|manifest\.webmanifest)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Vite hashed assets — cache forever (filename hash changes with content)
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        gzip_static on;
    }

    # API proxy — no Nginx caching, pass directly to Fastify
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         "upgrade";
    }

    location = /health {
        proxy_pass http://127.0.0.1:3000/health;
    }

    # SPA fallback — all unmatched paths serve index.html (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/zopkit.com-0001/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/zopkit.com-0001/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# ── HTTP → HTTPS redirect for zopkit.com (certbot-managed) ───────────────────
server {
    if ($host = www.zopkit.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = zopkit.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name www.zopkit.com zopkit.com;
    return 404; # managed by Certbot
}

