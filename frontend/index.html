<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="https://res.cloudinary.com/dr9vzaa7u/image/upload/v1765126845/Zopkit_Simple_Logo_glohfr.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zopkit</title>
    <meta name="description" content="Zopkit - Complete Business Operations Suite. Streamline your CRM, HRMS, Finance, Operations, and more with our unified platform." />
    
    <!-- Fonts: async to avoid render-blocking on first load.
         display=swap means text shows in system fallback while the font downloads.
         The onload swap-in technique (media=print → all) is the standard non-blocking
         pattern endorsed by web.dev and PageSpeed Insights. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet"
          href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
          media="print" onload="this.media='all'">
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap">
    </noscript>
    
    <!-- Favicon -->
    <link rel="manifest" href="/site.webmanifest">
    
    <!-- Theme -->
    <meta name="theme-color" content="#ffffff">
    <meta name="color-scheme" content="light dark">
    <script>
      (function () {
        var key = 'zopkit-theme'
        var theme = localStorage.getItem(key)
        if (!theme) {
          var legacy = localStorage.getItem('theme')
          if (legacy === 'dark' || legacy === 'monochrome' || legacy === 'system' || legacy === 'light') {
            theme = legacy
            localStorage.setItem(key, legacy)
            localStorage.removeItem('theme')
          }
        }
        var root = document.documentElement
        root.classList.remove('dark', 'monochrome')
        root.removeAttribute('data-theme')
        if (theme === 'dark') {
          root.classList.add('dark')
          root.dataset.theme = 'dark'
        } else if (theme === 'monochrome') {
          root.classList.add('monochrome')
          root.dataset.theme = 'monochrome'
        } else if (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches) {
          root.classList.add('dark')
          root.dataset.theme = 'dark'
        } else {
          root.dataset.theme = 'light'
        }
      })()
    </script>
  </head>
  <body class="font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
